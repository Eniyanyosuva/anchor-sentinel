name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deployment; queueing newer runs and
# dropping older ones keeps the gh-pages branch consistent.
concurrency:
  group: pages
  cancel-in-progress: false

# The peaceiris action pushes directly to the `gh-pages` branch, so
# we need write access to the repo. `contents: write` is enough —
# we don't need the `pages:` permission that the official
# actions/deploy-pages action requires.
permissions:
  contents: write

jobs:
  build-and-deploy:
    name: build-wasm + deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install wasm-pack
        # Install via cargo (slow but reliable — the curl|sh installer
        # hits a dash-vs-bash issue on the GitHub-hosted runners).
        run: cargo install wasm-pack --locked

      - name: Build WASM module into playground/pkg/
        run: wasm-pack build --target web --out-dir playground/pkg

      - name: Deploy playground/ to the gh-pages branch
        # Skip peaceiris/actions-gh-pages@v3 — its `cp -RfL` glob
        # silently dropped the `playground/pkg/` directory in our
        # setup, leaving the deployed page unable to find its WASM
        # module. A direct `git push` to gh-pages is more reliable
        # and easier to reason about.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "::group::source tree before deploy"
          ls -la ./playground
          echo "::endgroup::"
          TMPDIR=$(mktemp -d)
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git clone --depth=1 --branch=gh-pages \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "$TMPDIR"
          # Wipe the old gh-pages tree, then copy the fresh build in.
          # `rm -rf` + `cp -R` (rather than `cp -u` or `rsync`) makes
          # sure deleted files in the new build actually disappear
          # (e.g. a renamed rule's snapshot).
          find "$TMPDIR" -mindepth 1 -maxdepth 1 -not -path "$TMPDIR/.git*" -exec rm -rf {} +
          cp -R ./playground/. "$TMPDIR"/
          echo "::group::tempdir after copy"
          ls -la "$TMPDIR"
          echo "::endgroup::"
          cd "$TMPDIR"
          # Stage everything we just copied. `git add --all` respects
          # .gitignore, but `playground/pkg/` isn't in our ignore list
          # (and the build produces real .wasm/.js files that must
          # land in the deployed tree).
          git add --all
          echo "::group::git status"
          git status --short
          echo "::endgroup::"
          # `git diff --cached --quiet` exits 0 when there's nothing
          # to commit. Allow that as a no-op so re-running the
          # workflow on the same commit doesn't fail.
          git diff --cached --quiet || git commit -m "deploy: anchor-sentinel playground (commit ${GITHUB_SHA})"
          git push origin gh-pages --force
