name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: build-wasm + deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      # Build AND deploy in the same step. In a previous version, the
      # build and the deploy were separate steps, and somehow the
      # `playground/pkg/` directory was always empty when the deploy
      # step tried to read it (even though `ls` and `find` in the
      # same deploy step showed the files). Building inline keeps
      # everything in one shell, one filesystem view, one
      # namespace.
      - name: Build WASM and deploy to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Build the WASM module.
          wasm-pack build --target web --out-dir playground/pkg
          echo "--- built; pkg/ has $(ls playground/pkg | wc -l) entries ---"
          ls -la playground/pkg

          # Clone the existing gh-pages branch into a temp dir.
          TMPDIR=$(mktemp -d)
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git clone --depth=1 --branch=gh-pages \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "$TMPDIR"

          # rsync the freshly built playground/ into the cloned
          # gh-pages tree, replacing whatever was there.
          rsync -a --delete --exclude '.git' ./playground/ "$TMPDIR"/

          # Stage and commit.
          cd "$TMPDIR"
          git add --all
          git status --short
          git diff --cached --quiet || \
            git commit -m "deploy: anchor-sentinel playground (commit ${GITHUB_SHA})"
          git push origin gh-pages --force
